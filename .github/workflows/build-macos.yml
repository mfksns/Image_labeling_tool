name: Build macOS App

# 触发条件：当你推送带有 'v' 开头的 Tag 时触发 (例如 v1.0.0)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 允许在网页端手动触发

jobs:
  build-macos:
    # 使用 GitHub 提供的 macOS 虚拟环境 (目前默认是 Apple Silicon ARM64)
    runs-on: macos-latest 
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 3.13 环境
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip' # 开启 pip 缓存加速

      # 3. 安装依赖和 PyInstaller
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. 使用 PyInstaller 打包
      - name: Build with PyInstaller
        run: |
          # 参数说明：
          # --noconfirm: 覆盖已有输出目录
          # --onedir: 打包成目录结构 (macOS 推荐，启动快且稳定)
          # --windowed: 隐藏终端黑窗口 (如果是纯命令行工具请删除此参数)
          # --name: 生成的 App 名称
          # --icon: 指定图标路径
          # --add-data: 如果你有需要打包的额外资源文件，可以取消注释下面这行
          # --add-data "assets/data_folder:data_folder" 
          
          pyinstaller --noconfirm --onedir --windowed \
            --name "MyPythonApp" \
            --icon "assets/icon.icns" \
            main.py

      # 5. 压缩 .app 为 .zip (使用 macOS 原生 ditto 命令保留权限)
      - name: Compress App
        run: |
          cd dist
          # 获取当前 Git Tag 作为版本号
          VERSION=${GITHUB_REF#refs/tags/}
          # 使用 ditto 压缩，这是 macOS 下打包 .app 最标准的方式
          ditto -c -k --keepParent "MyPythonApp.app" "MyPythonApp-${VERSION}-macOS-ARM64.zip"

      # 6. 发布到 GitHub Releases
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # 上传刚才生成的 zip 文件
          files: dist/MyPythonApp-*-macOS-ARM64.zip
          generate_release_notes: true # 自动生成更新日志
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build macOS App (Dual Architecture)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    # 核心修改：使用矩阵策略，同时跑 Intel 和 ARM 两个环境
    strategy:
      matrix:
        # macos-13 是 Intel (x86_64)，macos-14 是 Apple Silicon (ARM64)
        os: [macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          # 注意：这里去掉了 cache: 'pip'，防止找不到 requirements.txt 报错

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # 如果你有第三方依赖，请取消下面这行的注释，并确保仓库里有 requirements.txt
          # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed \
            --name "Image_labeling_tool" \
            --icon "icon.ico" \
            main.py

      - name: Compress App
        run: |
          cd dist
          VERSION=${GITHUB_REF#refs/tags/}
          # 根据当前运行的环境，动态命名 zip 文件
          if [ "${{ matrix.os }}" == "macos-13" ]; then
            ARCH="Intel-x86_64"
          else
            ARCH="AppleSilicon-ARM64"
          fi
          ditto -c -k --keepParent "Image_labeling_tool.app" "Image_labeling_tool-${VERSION}-macOS-${ARCH}.zip"

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # 使用通配符，自动上传 dist 目录下生成的所有 zip 文件
          files: dist/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
